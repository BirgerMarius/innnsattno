project:
  name: innsatt.no
  shortName: innsatt-no

type:
  application: web
  framework: laravel
  language: php

repository:
  provider: github
  url: git@github.com:BirgerMarius/innnsattno.git
  defaultBranch: main

deployment:
  strategy: git-pull

runtime:
  prompt: developer
  review: standard
  testCommand: "docker compose -f compose.local.yaml exec -T innsatt-local php artisan test tests/Feature/HomepageTextTest.php"
  testTimeoutSeconds: 600

paths:
  context: context
  backlog: backlog
  workPackages: work-packages
  reviews: reviews
  releases: releases
